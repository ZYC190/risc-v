wheeltec_arm_grasp_node:
  ros__parameters:
    # ==========================================
    # 机械臂连杆参数 (与 arm_grabber.py 第38-41行完全一致)
    # ==========================================
    auxiliary_angle: 0.0        # 辅助角 (弧度)
    link_a: 0.105               # 连杆A长度 (米)
    link_b: 0.105               # 连杆B长度 (米)
    link_c: 0.145               # 连杆C长度 (米)
    link_h: 0.080               # 连杆H长度 (米)

    # ==========================================
    # 抓取标定偏置 (与 arm_grabber.py 第46-50行完全一致)
    # x_offset: 正值=夹爪往右, 负值=夹爪往左
    # y_offset: 正值=夹爪往前, 负值=夹爪往后
    # ==========================================
    x_offset: -0.015
    y_offset: -0.035

    # ==========================================
    # 串口配置
    # ==========================================
    serial_port: "/dev/wheeltec_arm"
    serial_baud: 115200

    # ==========================================
    # TF 坐标系 (保留, arm_grasp_node 不再使用)
    # ==========================================
    camera_frame: "camera_color_optical_frame"
    arm_base_frame: "table_arm_base_link"

    # ==========================================
    # 抓取动作参数
    # ==========================================
    approach_height_z: 0.05     # 预接近高度 (0=直接到目标)
    lift_height_z: 0.10         # 抬起高度 (0=不额外抬高)

    # ==========================================
    # 夹爪角度 (与 arm_grabber.py 第158-167行完全一致)
    # ==========================================
    hand_open_angle: 1.57      # 夹爪张开 (1.57≈90°, 全开)
    hand_close_angle: -0.4     # 夹爪闭合 (-0.4≈-23°)

    # ==========================================
    # 大臂下压幅度 (与 arm_grabber.py 第147行完全一致)
    # 负值越大下压越猛, 0=不下压
    # ==========================================
    down_offset: -2.2
