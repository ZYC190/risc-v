# ==========================================
# 眼在手外 (Eye-to-Hand) 标定参数
# 相机光学坐标系 → 机械臂基座坐标系的静态变换
#
# ⚠️ 这些值需要根据你的实际安装位置标定！
#
# 相机光学坐标系 (ROS 标准):
#   +Z = 向前 (场景深度方向)
#   +X = 向右 (水平)
#   +Y = 向下 (垂直)
#
# 机械臂基座坐标系 (ROS 标准):
#   +X = 向前 (机械臂正前方)
#   +Y = 向左
#   +Z = 向上
#
# 标定方法:
#   1. 手动测量法: 放一个已知位置的物体，反复调参
#   2. ChArUco 手眼标定: OpenCV calibrateHandEye()
# ==========================================

static_tf_args:
  x: -0.30          # 相机在机械臂基座前方的水平距离 (米)
  y: -0.15         # 相机在机械臂基座左侧的水平距离 (米)
  z: 0.45          # 相机相对机械臂基座的高度 (米)
  roll: 1.57       # 绕X轴旋转 (rad) - 相机光轴从向前转为向下
  pitch: 0.52      # 绕Y轴旋转 (rad) - 俯仰角微调
  yaw: 0.0         # 绕Z轴旋转 (rad) - 偏航角
